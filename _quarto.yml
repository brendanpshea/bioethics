project:
  type: website
  output-dir: docs

# ----- Citations (Chicago author-date) -----
# CSL fetched once from https://www.zotero.org/styles/chicago-author-date
# and stored locally for offline-stable rendering. To refresh, re-download.
bibliography: refs.bib
csl: chicago-author-date.csl
link-citations: true
citations-hover: true

website:
  title: "Bioethics: An Open Educational Resource"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: chapters/00-course-outline.qmd
        text: "Outline"
      - text: "1. Principles & Reasoning"
        menu:
          - href: chapters/01-introduction.qmd
            text: "Part A — The Four Principles"
          - href: chapters/01b-theories.qmd
            text: "Part B — Ethical Theories"
      - text: "2. History & Relationship"
        menu:
          - href: chapters/02a-history.qmd
            text: "Part A — History"
          - href: chapters/02b-clinical-relationship.qmd
            text: "Part B — Clinical Relationship"
      - text: "3. Research Ethics"
        menu:
          - href: chapters/03a-clinical-research.qmd
            text: "Part A — How Clinical Research Works"
          - href: chapters/03b-protecting-research-subjects.qmd
            text: "Part B — Protecting Research Subjects"
    right:
      - icon: github
        href: https://github.com/brendanpshea/bioethics-oer

  page-footer:
    left: |
      [![CC BY-NC 4.0](https://licensebuttons.net/l/by-nc/4.0/88x31.png)](https://creativecommons.org/licenses/by-nc/4.0/)
      Licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)
    right: "Brendan Shea"

format:
  html:
    theme: cosmo
    css: styles/custom.css
    toc: true
    toc-depth: 3
    number-sections: true
    link-external-icon: true
    link-external-newwindow: true

  revealjs:
    theme: [white, styles/slides.scss]
    css: styles/custom.css
    slide-number: true
    chalkboard: true
    preview-links: auto
    transition: fade
    transition-speed: fast
    scrollable: true
    footer: "Bioethics OER · CC BY-NC 4.0 · Brendan Shea"
    controls: true
    progress: true
    history: true
    highlight-style: github
