project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - chapters/*.qmd
    - cases/*.qmd

# ----- Citations (Chicago author-date) -----
# CSL fetched once from https://www.zotero.org/styles/chicago-author-date
# and stored locally for offline-stable rendering. To refresh, re-download.
bibliography: refs.bib
csl: chicago-author-date.csl
link-citations: true
citations-hover: true

website:
  title: "Bioethics: An Open Educational Resource"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: chapters/00-course-outline.qmd
        text: "Outline"
    right:
      - icon: github
        href: https://github.com/brendanpshea/bioethics-oer

  sidebar:
    style: floating
    collapse-level: 1
    contents:
      - href: index.qmd
        text: "Home"
      - href: chapters/00-course-outline.qmd
        text: "Course Outline"
      - section: "1. Principles & Reasoning"
        contents:
          - href: chapters/01-introduction.qmd
            text: "Part A — The Four Principles"
          - href: chapters/01b-theories.qmd
            text: "Part B — Ethical Theories"
      - section: "2. History & Relationship"
        contents:
          - href: chapters/02a-history.qmd
            text: "Part A — History"
          - href: chapters/02b-clinical-relationship.qmd
            text: "Part B — Clinical Relationship"
      - section: "3. Research Ethics"
        contents:
          - href: chapters/03a-clinical-research.qmd
            text: "Part A — How Clinical Research Works"
          - href: chapters/03b-protecting-research-subjects.qmd
            text: "Part B — Protecting Research Subjects"
      - section: "4. Abortion"
        contents:
          - href: chapters/04a-abortion.qmd
            text: "Part A — Moral Status"
          - href: chapters/04b-abortion-law.qmd
            text: "Part B — Law & Cases"
      - section: "5. Autonomy, Paternalism, and Reproduction"
        contents:
          - href: chapters/05a-paternalism.qmd
            text: "Part A — Paternalism & Its Limits"
          - href: chapters/05b-reproductive-markets.qmd
            text: "Part B — Markets & Surrogacy"
      - section: "6. Genomics & Enhancement"
        contents:
          - href: chapters/06a-genomics-reading.qmd
            text: "Part A — Reading Genomes"
          - href: chapters/06b-genomics-enhancement.qmd
            text: "Part B — Engineering Persons"
      - section: "7. End-of-Life Care"
        contents:
          - href: chapters/07a-death-dying.qmd
            text: "Part A — Death, Dying & Advance Planning"
          - href: chapters/07b-euthanasia.qmd
            text: "Part B — Euthanasia & Assisted Death"
      - section: "8. Justice & Health Care"
        contents:
          - href: chapters/08a-justice-health.qmd
            text: "Part A — Theories of Justice & the Right to Care"
          - href: chapters/08b-us-healthcare.qmd
            text: "Part B — Why US Health Care Costs So Much"
      - section: "9. Public Health Ethics"
        contents:
          - href: chapters/09a-public-health.qmd
            text: "Part A — From Patient to Population"
          - href: chapters/09b-public-health-beliefs.qmd
            text: "Part B — False Beliefs & the Ethics of Correction"
      - section: "10. AI in Medicine"
        contents:
          - href: chapters/10a-medical-ai.qmd
            text: "Part A — How Medical AI Works and Where It Goes Wrong"
          - href: chapters/10b-fifth-principle.qmd
            text: "Part B — The Fifth Principle: Consent, Accountability, and Black Boxes"
      - section: "11. Gender, Identity & Disability"
        contents:
          - href: chapters/11a-gender-affirming-care.qmd
            text: "Part A — Gender-Affirming Care: Deciding Under Uncertainty"
          - href: chapters/11b-disability-identity.qmd
            text: "Part B — Disability, Identity, and the Limits of Autonomy"

  page-footer:
    left: |
      [![CC BY-NC 4.0](https://licensebuttons.net/l/by-nc/4.0/88x31.png)](https://creativecommons.org/licenses/by-nc/4.0/)
      Licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)
    right: "Brendan Shea"

format:
  html:
    theme: cosmo
    css: styles/custom.css
    toc: true
    toc-depth: 3
    number-sections: true
    link-external-icon: true
    link-external-newwindow: true

  revealjs:
    theme: [white, styles/slides.scss]
    css: styles/custom.css
    slide-number: true
    chalkboard: true
    preview-links: auto
    transition: fade
    transition-speed: fast
    scrollable: true
    footer: "Bioethics OER · CC BY-NC 4.0 · Brendan Shea"
    controls: true
    progress: true
    history: true
    highlight-style: github
